<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Cat ears (behind head) -->
  <rect x="22" y="18" width="26" height="26" rx="4" ry="4" fill="#ff4d6a" transform="rotate(-10 35 31)"/>
  <rect x="92" y="18" width="26" height="26" rx="4" ry="4" fill="#4dc4ff" transform="rotate(10 105 31)"/>

  <!-- Body -->
  <rect x="30" y="60" width="80" height="70" rx="18" ry="18" fill="#222"/>

  <!-- Head -->
  <rect x="30" y="38" width="80" height="68" rx="16" ry="16" fill="#222"/>

  <!-- Eyes (round) -->
  <circle cx="56" cy="64" r="9" fill="#ffd94d"/>
  <circle cx="84" cy="64" r="9" fill="#4dff91"/>
  <circle cx="56" cy="64" r="4" fill="#080808"/>
  <circle cx="84" cy="64" r="4" fill="#080808"/>
  <circle cx="59" cy="61" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="87" cy="61" r="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Nose -->
  <polygon points="70,78 67,83 70,86 73,83" fill="#b070e8"/>

  <!-- Mouth (closed, happy) -->
  <path d="M67,86 Q64,91 60,90" fill="none" stroke="#b070e8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M73,86 Q76,91 80,90" fill="none" stroke="#b070e8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Arms holding cup -->
  <rect x="26" y="95" width="16" height="28" rx="8" ry="8" fill="#333"/>
  <rect x="98" y="95" width="16" height="28" rx="8" ry="8" fill="#333"/>

  <!-- Coffee cup -->
  <rect x="38" y="100" width="64" height="40" rx="6" ry="6" fill="#b070e8"/>
  <rect x="42" y="104" width="56" height="10" rx="3" ry="3" fill="#9050d0"/>
  <!-- Cup handle -->
  <rect x="102" y="108" width="14" height="20" rx="7" ry="7" fill="none" stroke="#b070e8" stroke-width="4"/>

  <!-- Steam -->
  <path d="M55,98 Q53,88 57,82" fill="none" stroke="#ffd94d" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M70,96 Q68,86 72,78" fill="none" stroke="#4dff91" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M85,98 Q83,88 87,82" fill="none" stroke="#4dc4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
